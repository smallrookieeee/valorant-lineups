<!DOCTYPE html>
<!-- HTML5文档类型声明 -->
<html>
<!-- 页面头部，包含元数据和样式 -->
<head>
    <meta charset="utf-8">
    <!-- 设置字符编码为UTF-8 -->
    <title>点位列表 - 预览</title>
    <!-- 页面标题 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Tailwind CSS框架 -->
    <style>
        /* 自定义样式 */
        body { background-color: #0f1923; color: #ece8e1; }
        .preview-card { background-color: #1a1e22; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .preview-card:hover { transform: scale(1.02); background-color: #2a2e33; }
    </style>
</head>
<!-- 页面主体 -->
<body class="p-6">
    <!-- 顶部导航栏 -->
    <div class="flex justify-between items-center mb-8">
        <button onclick="window.location.href='index.html'" class="text-xs border border-gray-600 px-4 py-2 uppercase font-bold hover:bg-white hover:text-black">← Back</button>
        <!-- 返回按钮 -->
        <h2 id="map-title" class="text-2xl font-black italic uppercase">Map Intel</h2>
        <!-- 地图标题 -->
    </div>

    <!-- 技能列表容器 -->
    <div id="skill-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        </div>

    <!-- 引入数据脚本 -->
    <script src="data.js"></script>
    <!-- 主脚本 -->
    <script>
        // 1) 从 sessionStorage 读取地图名（由 index.html 选择）
        const mapName = sessionStorage.getItem('curMap');
        // 2) 获取技能列表容器元素引用
        const list = document.getElementById('skill-list');

        // 3) 如果有地图名且 data.js 数据有效，就渲染该地图下的技能卡片
        if (mapName && Array.isArray(data.maps)) {
            // 查找到当前地图对象
            const map = data.maps.find((m) => m.name === mapName);
            // 设置标题为当前地图名，增强可见性
            document.getElementById('map-title').innerText = mapName;

            // 连续遍历英雄列表和技能列表
            map.heroes.forEach((hero) => {
                hero.skills.forEach((skillItem, index) => {
                    // 创建单个技能卡片容器
                    const card = document.createElement('div');
                    card.className = "preview-card overflow-hidden shadow-lg border-b-2 border-red-500";

                    // 点击时保存当前英雄和技能索引，然后跳转详情页
                    card.onclick = () => {
                        sessionStorage.setItem('curHero', hero.name);
                        sessionStorage.setItem('curSkillIndex', index);
                        window.location.href = 'detail.html';
                    };

                    // 每个卡片显示技能效果图、英雄名、技能名、类型和阵营标签
                    card.innerHTML = `
                        <div class="h-64 bg-black">
                            <img src="${skillItem.img_effect}" class="w-full h-full object-cover opacity-80">
                        </div>
                        <div class="p-3">
                            <div class="text-[9px] text-gray-500 font-bold uppercase">${hero.name}</div>
                            <div class="text-sm font-bold truncate text-white">${skillItem.skill}</div>
                            <div class="mt-2 text-[10px] text-red-400 font-bold">${skillItem.side} | ${skillItem.type}</div>
                        </div>
                    `;

                    // 将卡片追加到页面
                    list.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
