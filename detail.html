<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>点位详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1923; color: #ece8e1; }
        .detail-img-container { background-color: #1a1e22; border: 1px solid #333; }
        .img-label { background: #ff4655; color: white; padding: 2px 10px; font-size: 12px; font-weight: bold; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body class="p-4 md:p-12 max-w-4xl mx-auto">
    
    <button onclick="window.location.href='skill.html'" class="mb-6 text-xs border border-gray-600 px-4 py-2 uppercase font-bold text-gray-400 hover:text-white transition">← 返回列表</button>

    <div id="detail-content">
        </div>

    <script src="data.js"></script>
    <script>
        // 1) 从 sessionStorage 读取导航上下文
        const mapName = sessionStorage.getItem('curMap');
        const heroName = sessionStorage.getItem('curHero');
        const skillIndex = sessionStorage.getItem('curSkillIndex');
        // 2) 找到显示详情内容的容器
        const content = document.getElementById('detail-content');

        // 3) 如果都有值则渲染详细信息
        if (mapName && heroName && skillIndex !== null) {
            // 3.1 查找地图和英雄数据对象
            const map = data.maps.find((m) => m.name === mapName);
            const hero = map.heroes.find((h) => h.name === heroName);
            // 3.2 使用索引选择当前技能
            const s = hero.skills[skillIndex];

            // 4) 动态生成详细页面结构
           // detail.html 逻辑部分
            content.innerHTML = `
                <div class="mb-8">
                    <h1 class="text-3xl font-black italic uppercase text-white mb-2">${s.skill}</h1>
                    <p class="text-red-500 font-bold text-sm tracking-widest">${hero.name} · ${mapName} · ${s.side}</p>
                </div>

                <div class="space-y-10">
                    <div class="space-y-2 text-gray-300">
                        <div class="detail-img-container relative rounded shadow-2xl overflow-hidden mb-2">
                            <span class="img-label">1. 站位 (POSITION)</span>
                            <img src="${s.img_pos}" class="w-full h-auto block">
                        </div>
                        <p class="text-sm pl-2 border-l-2 border-gray-700">📍 ${s.pos}</p>
                    </div>

                    <div class="space-y-3">
                        <div class="detail-img-container relative rounded shadow-2xl overflow-hidden mb-2">
                            <span class="img-label">2. 瞄准 (AIM)</span>
                            <img src="${s.img_aim}" class="w-full h-auto block">
                        </div>
                        
                        <div class="flex gap-4 pl-2">
                            <div class="bg-red-500/10 border border-red-500/50 px-3 py-1 rounded text-xs">
                                <span class="text-red-500 font-bold italic">POWER:</span> 
                                <span class="text-white ml-1 font-mono">${s.power || '即开'}</span>
                            </div>
                            <div class="bg-blue-500/10 border border-blue-500/50 px-3 py-1 rounded text-xs">
                                <span class="text-blue-500 font-bold italic">BOUNCE:</span> 
                                <span class="text-white ml-1 font-mono">${s.bounce || '0次'}</span>
                            </div>
                        </div>
                        
                        <p class="text-sm text-gray-400 pl-2 border-l-2 border-red-500/50">
                            🎯 ${s.aim}
                        </p>
                    </div>

                    <div class="space-y-2 text-gray-300">
                        <div class="detail-img-container relative rounded shadow-2xl overflow-hidden mb-2">
                            <span class="img-label">3. 效果 (EFFECT)</span>
                            <img src="${s.img_effect}" class="w-full h-auto block">
                        </div>
                        <p class="text-sm pl-2 border-l-2 border-gray-700 italic">✨ ${s.effect}</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
