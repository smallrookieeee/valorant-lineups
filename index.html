<!DOCTYPE html>
<!-- HTML5文档类型声明 -->
<html lang="zh-CN">
<!-- 设置语言为中文 -->
<head>
    <meta charset="utf-8">
    <!-- 设置字符编码为UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 响应式设计视口设置 -->
    <title>VALORANT 技能点位查询 - 首页</title>
    <!-- 页面标题 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Tailwind CSS框架 -->
    <style>
        /* 瓦罗兰特暗色调风格背景 */
        body { background-color: #0f1923; color: #ece8e1; }
        /* 地图卡片样式 */
        .map-card { 
            background-color: #1f2326; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 鼠标悬停：背景变红，卡片向上移动 */
        .map-card:hover { 
            background-color: #ff4655; 
            transform: translateY(-8px);
            border-color: #ff4655;
        }
    </style>
</head>
<!-- 页面主体 -->
<body class="min-h-screen flex flex-col items-center p-8">

    <!-- 页面头部 -->
    <header class="text-center my-16">
        <h1 class="text-6xl font-black italic text-white mb-4 uppercase tracking-tighter">VALORANT LINEUPS</h1>
        <!-- 主标题 -->
        <div class="h-1.5 w-32 bg-red-500 mx-auto"></div>
        <!-- 装饰线 -->
        <p class="mt-6 text-gray-400 text-sm tracking-[0.2em] uppercase font-bold">选择地图进行点位查询</p>
        <!-- 副标题 -->
    </header>

    <!-- 地图列表容器 -->
    <div id="map-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 w-full max-w-6xl">
        <p id="tip" class="col-span-full text-center text-gray-500 animate-pulse">正在同步卫星导航数据...</p>
        <!-- 加载提示 -->
    </div>

    <!-- 引入数据脚本 -->
    <script src="data.js"></script>
    <!-- 主脚本 -->
    <script>
        // 1. 获取 DOM 元素引用
        // mapList: 放置地图卡片的容器
        const mapList = document.getElementById('map-list');
        // tip: 加载提示与错误提示
        const tip = document.getElementById('tip');

        // 2. 数据完整性检查
        // 如果 data.js 未正确加载，或者 data.maps 不是数组，则提示错误
        if (typeof data === 'undefined' || !Array.isArray(data.maps)) {
            tip.innerText = '❌ 无法读取 data.js，请检查文件名或路径';
            tip.className = "col-span-full text-center text-red-500 font-bold";
        } else {
            // 3. 数据有效时，移除初始化提示
            tip.remove();

            // 4. 遍历每张地图并生成可点击卡片
            // 遍历 data.js 里的每一张地图
            data.maps.forEach(map => {
                // --- 新增逻辑：计算该地图下所有英雄的点位总数 ---
                let totalSkills = 0;
                map.heroes.forEach(hero => {
                    // 将每个英雄名下的技能数量累加起来
                    totalSkills += hero.skills.length;
                });
                // ------------------------------------------

                const card = document.createElement('div');
                card.className = "map-card p-10 rounded-sm cursor-pointer group relative overflow-hidden";
                
                // 点击卡片：将选中的地图名存入临时缓存，并跳转页面
                card.onclick = () => {
                    sessionStorage.setItem('curMap', map.name);
                    window.location.href = 'skill.html';
                };

                card.innerHTML = `
                    <div class="flex justify-between items-center relative z-10">
                        <h2 class="text-3xl font-black uppercase group-hover:text-white">${map.name}</h2>
                        <span class="text-red-500 group-hover:text-white text-2xl font-bold">→</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-4 group-hover:text-white/80 uppercase tracking-widest">
                        已录入点位: ${totalSkills}
                    </p>
                `;
                mapList.appendChild(card);
            });
        }
    </script>
</body>
<!-- 页面主体结束 -->
</html>
<!-- HTML文档结束 -->
